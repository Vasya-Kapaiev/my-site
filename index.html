<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPAIEV OS v5.0 | МОНЕТИЗАЦИЯ</title>
    <style>
        body { background: #000; margin: 0; overflow-x: hidden; font-family: 'Courier New', monospace; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.2; }
        
        .container { position: relative; z-index: 10; text-align: center; background: rgba(0, 0, 0, 0.85); padding: 30px; border: 2px solid #00ff9d; border-radius: 10px; box-shadow: 0 0 30px #00ff9d; max-width: 600px; width: 90%; margin: 40px 0; }
        
        h1 { color: #00ff9d; text-shadow: 0 0 10px #00ff9d; letter-spacing: 3px; font-size: 2em; }
        .mission { color: #00d1ff; margin: 10px 0; font-weight: bold; }

        /* Блок Прайса */
        .price-section { margin-top: 30px; }
        .price-card {
            border: 1px solid #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            transition: 0.3s;
            background: rgba(0, 255, 157, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price-card:hover {
            border-color: #00ff9d;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            transform: scale(1.02);
        }
        .price-name { font-weight: bold; color: #fff; }
        .price-value { color: #00ff9d; font-size: 1.2em; text-shadow: 0 0 5px #00ff9d; }

        .btn { background: #00ff9d; color: #000; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; box-shadow: 0 0 15px #00ff9d; display: inline-block; transition: 0.3s; margin-top: 25px; }
        .btn:hover { background: #fff; box-shadow: 0 0 25px #fff; transform: translateY(-3px); }
    </style>
</head>
<body>

<canvas id="m"></canvas>

<div class="container">
    <h1>KAPAIEV_SYSTEM</h1>
    <div class="mission">ЦЕЛЬ: ДОМ И МАШИНА К 20 ГОДАМ</div>
    
    <div class="price-section">
        <h3>УСЛУГИ РАЗРАБОТКИ:</h3>
        
        <div class="price-card">
            <div class="price-name">САЙТ-ВИЗИТКА</div>
            <div class="price-value">от 5 000 ₽</div>
        </div>
        
        <div class="price-card">
            <div class="price-name">LANDING PAGE</div>
            <div class="price-value">от 10 000 ₽</div>
        </div>
        
        <div class="price-card">
            <div class="price-name">ТЕЛЕГРАМ БОТ</div>
            <div class="price-value">от 7 000 ₽</div>
        </div>
    </div>

    <a href="https://t.me/Vasya_Kapaiev" class="btn">ОБСУДИТЬ ПРОЕКТ</a>
</div>

<script>
    const canvas = document.getElementById('m');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const char = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = char[Math.floor(Math.random() * char.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);
</script>

</body>
</html>
