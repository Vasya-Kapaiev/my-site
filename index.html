<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Kapaiev v3.0</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный фон (сканирующая линия) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 157, 0.3);
            box-shadow: 0 0 20px #00ff9d;
            animation: scan 4s linear infinite;
            z-index: 1;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #00ff9d;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.2);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #00ff9d;
            text-shadow: 0 0 10px #00ff9d;
            margin-bottom: 10px;
        }

        .typing {
            border-right: 2px solid #00ff9d;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: typing 3.5s steps(40, end), blink .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #00ff9d; }
        }

        .mission {
            margin: 25px 0;
            font-size: 1.2em;
            color: #00d1ff;
            font-weight: bold;
            text-shadow: 0 0 5px #00d1ff;
        }

        .buy-button {
            background: #00ff9d;
            padding: 15px 30px;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 15px #00ff9d;
            text-transform: uppercase;
        }

        .buy-button:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="typing">СИСТЕМА АКТИВИРОВАНА</h1>
    <p>Василий Капаев: Веб-разработчик будущего</p>
    <div class="mission">ЦЕЛЬ: ДОМ И МАШИНА К 20 ГОДАМ</div>
    <a href="https://t.me/Vasya_Kapaiev" class="buy-button">ЗАПУСТИТЬ ПРОЕКТ</a>
</div>

</body>
</html>
