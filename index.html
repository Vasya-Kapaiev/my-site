<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Kapaiev v3.5</title>
    <style>
        body {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Сканирующая линия */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 157, 0.4);
            box-shadow: 0 0 20px #00ff9d;
            animation: scan 4s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #00ff9d;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.1);
            max-width: 600px;
            width: 90%;
            margin: 20px;
        }

        h1 {
            font-size: 2.2em;
            color: #00ff9d;
            text-shadow: 0 0 10px #00ff9d;
            margin-bottom: 5px;
        }

        .mission {
            margin: 15px 0;
            font-size: 1.1em;
            color: #00d1ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Блок навыков */
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .skill-item {
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            transition: 0.3s;
            font-size: 0.9em;
        }

        .skill-item:hover {
            border-color: #00ff9d;
            background: rgba(0, 255, 157, 0.05);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.2);
        }

        .buy-button {
            background: #00ff9d;
            padding: 18px 35px;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 15px #00ff9d;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .buy-button:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>KAPAIEV_SYSTEM</h1>
    <p>Статус: <span style="color:#00ff9d;">В СЕТИ</span></p>
    
    <div class="mission">ЦЕЛЬ: ДОМ И МАШИНА К 20 ГОДАМ</div>

    <div class="skills-grid">
        <div class="skill-item">РАЗРАБОТКА САЙТОВ</div>
        <div class="skill-item">HTML5 / CSS3 / JS</div>
        <div class="skill-item">UI/UX ДИЗАЙН</div>
        <div class="skill-item">ТЕЛЕГРАМ БОТЫ</div>
    </div>

    <a href="https://t.me/Vasya_Kapaiev" class="buy-button">ОТПРАВИТЬ ЗАПРОС</a>
</div>

</body>
</html>
