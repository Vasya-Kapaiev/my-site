<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPAIEV OS v4.1</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.3; }
        .container { position: relative; z-index: 10; text-align: center; background: rgba(0, 0, 0, 0.8); padding: 30px; border: 2px solid #00ff9d; border-radius: 10px; box-shadow: 0 0 30px #00ff9d; max-width: 500px; width: 90%; }
        h1 { color: #00ff9d; text-shadow: 0 0 10px #00ff9d; letter-spacing: 3px; }
        .mission { color: #00d1ff; margin: 20px 0; font-weight: bold; font-size: 1.1em; }
        .skills { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .skill { border: 1px solid #444; padding: 8px; border-radius: 4px; transition: 0.3s; cursor: crosshair; }
        .skill:hover { border-color: #00ff9d; background: rgba(0, 255, 157, 0.1); box-shadow: 0 0 15px #00ff9d; transform: scale(1.05); }
        .btn { background: #00ff9d; color: #000; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; box-shadow: 0 0 15px #00ff9d; display: inline-block; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 25px #fff; }
    </style>
</head>
<body>

<canvas id="m"></canvas>

<div class="container">
    <h1>KAPAIEV_SYSTEM</h1>
    <div class="mission">ЦЕЛЬ: ДОМ И МАШИНА К 20 ГОДАМ</div>
    <div class="skills">
        <div class="skill">WEB_DEV</div>
        <div class="skill">HTML/CSS/JS</div>
        <div class="skill">UI_DESIGN</div>
        <div class="skill-item" style="border: 1px solid #444; padding: 8px; border-radius: 4px;">TG_BOTS</div>
    </div>
    <a href="https://t.me/Vasya_Kapaiev" class="btn">ОТПРАВИТЬ ЗАПРОС</a>
</div>

<script>
    const canvas = document.getElementById('m');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const char = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = char[Math.floor(Math.random() * char.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);
</script>

</body>
</html>
